let allImages = [];
let currentIndex = 0;
const CELL = 155;
const BATCH = 50;
let cols = 1;
let offsetX = 0;
let totalRows = 1;
let cells = [];
let gridMap = {};

const gridEl = document.getElementById('grid');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function posKey(r, c) { return r + ',' + c; }

function setupGrid() {
  cols = Math.max(1, Math.floor(window.innerWidth / CELL));
  offsetX = Math.floor((window.innerWidth - cols * CELL) / 2);
  totalRows = Math.ceil(allImages.length / cols);
  gridEl.style.height = (totalRows * CELL + CELL) + 'px';
}

function loadBatch(start) {
  var end = Math.min(start + BATCH, allImages.length);
  for (var i = start; i < end; i++) {
    var row = Math.floor(i / cols);
    var col = i % cols;

    var div = document.createElement('div');
    div.className = 'grid-cell';
    div.style.width = (CELL - 5) + 'px';
    div.style.height = (CELL - 5) + 'px';
    div.style.transform = 'translate(' + (offsetX + col * CELL) + 'px,' + (row * CELL) + 'px)';

    var img = new Image();
    img.alt = '';
    img.loading = 'lazy';
    img.decoding = 'async';
    img.onload = (function(d) { return function() { d.style.opacity = 1; }; })(div);
    img.onerror = (function(d) { return function() { d.style.display = 'none'; }; })(div);
    img.src = allImages[i];
    div.appendChild(img);

    var ci = cells.length;
    div.addEventListener('click', (function(index) {
      return function() { openLightbox(cells[index].imgIdx); };
    })(ci));

    gridEl.appendChild(div);
    cells.push({ el: div, row: row, col: col, imgIdx: i });
    gridMap[posKey(row, col)] = ci;
  }
  if (end < allImages.length) {
    setTimeout(function() { loadBatch(end); }, 1500);
  }
}

function slideRandom() {
  if (cells.length < 2) return;
  var idx = Math.floor(Math.random() * cells.length);
  var cell = cells[idx];
  if (!cell.el || cell.el.style.display === 'none') return;

  var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  var d = dirs[Math.floor(Math.random() * 4)];
  var nr = cell.row + d[0];
  var nc = cell.col + d[1];

  if (nr < 0 || nr >= totalRows || nc < 0 || nc >= cols) return;

  var key = posKey(nr, nc);
  var ti = gridMap[key];
  if (ti === undefined) return;

  var target = cells[ti];
  if (!target.el || target.el.style.display === 'none') return;

  // Swap in gridMap
  gridMap[posKey(cell.row, cell.col)] = ti;
  gridMap[key] = idx;

  // Swap row/col
  var tr = cell.row, tc = cell.col;
  cell.row = target.row; cell.col = target.col;
  target.row = tr; target.col = tc;

  // Animate via CSS transition
  cell.el.style.transform = 'translate(' + (offsetX + cell.col * CELL) + 'px,' + (cell.row * CELL) + 'px)';
  target.el.style.transform = 'translate(' + (offsetX + target.col * CELL) + 'px,' + (target.row * CELL) + 'px)';
}

async function init() {
  try {
    var r = await fetch('deca_images.json');
    var nfts = await r.json();
    allImages = shuffle(localImages.concat(nfts));
  } catch(e) {
    allImages = shuffle(localImages.slice());
  }
  setupGrid();
  loadBatch(0);
  // Start sliding after initial images load
  setTimeout(function() {
    setInterval(slideRandom, 200);
    setInterval(slideRandom, 350);
    setInterval(slideRandom, 500);
    setInterval(slideRandom, 650);
    setInterval(slideRandom, 800);
    setInterval(slideRandom, 1000);
    // Burst swaps: cascade 5 swaps rapidly every 2s
    setInterval(function() {
      for (var b = 0; b < 5; b++) {
        setTimeout(slideRandom, b * 80);
      }
    }, 2000);
  }, 3000);
}

// Lightbox
function openLightbox(imgIdx) {
  currentIndex = imgIdx;
  lightboxImg.src = allImages[imgIdx];
  lightbox.classList.add('open');
}

function closeLightbox() {
  lightbox.classList.remove('open');
  lightboxImg.src = '';
}

function navLightbox(dir) {
  currentIndex = (currentIndex + dir + allImages.length) % allImages.length;
  lightboxImg.src = allImages[currentIndex];
}

lightbox.addEventListener('click', function(e) {
  if (e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', function(e) {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

init();
</script>
