let allImages = [];
let currentIndex = 0;
let scale = 1;
let particles = [];
let animId = null;
const BATCH = 40;
const THUMB_SIZE = 180;
const canvas = document.getElementById('canvas');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function rnd(min, max) { return Math.random() * (max - min) + min; }

function createParticle(src, idx) {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const size = rnd(THUMB_SIZE * 0.6, THUMB_SIZE * 1.4);
  return {
    src, idx, size,
    x: rnd(-size, w),
    y: rnd(-size, h),
    vx: rnd(-0.3, 0.3),
    vy: rnd(-0.3, 0.3),
    opacity: 0,
    targetOpacity: 1,
    el: null,
    imgEl: null,
    loaded: false
  };
}

function spawnElement(p) {
  const div = document.createElement('div');
  div.className = 'float-item';
  div.style.width = p.size + 'px';
  div.style.height = p.size + 'px';
  div.style.left = p.x + 'px';
  div.style.top = p.y + 'px';
  div.style.opacity = 0;

  const img = new Image();
  img.alt = '';
  img.decoding = 'async';
  img.loading = 'lazy';
  img.onload = () => {
    p.loaded = true;
    p.targetOpacity = 1;
  };
  img.onerror = () => {
    div.remove();
    p.el = null;
  };
  img.src = p.src;

  div.appendChild(img);
  div.addEventListener('click', () => openLightbox(p.idx));
  canvas.appendChild(div);

  p.el = div;
  p.imgEl = img;
}

function animate() {
  const w = window.innerWidth;
  const h = window.innerHeight;

  for (const p of particles) {
    if (!p.el) continue;

    p.x += p.vx;
    p.y += p.vy;

    // Wrap around edges
    if (p.x > w + p.size) p.x = -p.size;
    if (p.x < -p.size * 2) p.x = w;
    if (p.y > h + p.size) p.y = -p.size;
    if (p.y < -p.size * 2) p.y = h;

    // Fade in
    if (p.loaded && p.opacity < p.targetOpacity) {
      p.opacity = Math.min(p.opacity + 0.01, p.targetOpacity);
    }

    p.el.style.transform = `translate(${p.x}px, ${p.y}px) scale(${scale})`;
    p.el.style.opacity = p.opacity;
  }

  animId = requestAnimationFrame(animate);
}

function loadBatch(imgs, startIdx) {
  const end = Math.min(startIdx + BATCH, imgs.length);
  for (let i = startIdx; i < end; i++) {
    const p = createParticle(imgs[i], i);
    particles.push(p);
    spawnElement(p);
  }
  if (end < imgs.length) {
    setTimeout(() => loadBatch(imgs, end), 2000);
  }
}

async function init() {
  try {
    const r = await fetch('deca_images.json');
    const nftImages = await r.json();
    allImages = shuffle(localImages.concat(nftImages));
  } catch {
    allImages = shuffle([...localImages]);
  }

  loadBatch(allImages, 0);
  animate();
}

// Zoom with mouse wheel / trackpad
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.05 : 0.05;
  scale = Math.max(0.2, Math.min(3, scale + delta));
}, { passive: false });

// Zoom with pinch gesture
let lastPinchDist = 0;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.hypot(dx, dy);
  }
}, { passive: true });

canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const delta = (dist - lastPinchDist) * 0.005;
    scale = Math.max(0.2, Math.min(3, scale + delta));
    lastPinchDist = dist;
  }
}, { passive: false });

// Lightbox
function openLightbox(i) {
  currentIndex = i;
  lightboxImg.src = allImages[i];
  lightbox.classList.add('open');
}

function closeLightbox() {
  lightbox.classList.remove('open');
  lightboxImg.src = '';
}

function navLightbox(dir) {
  currentIndex = (currentIndex + dir + allImages.length) % allImages.length;
  lightboxImg.src = allImages[currentIndex];
}

lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

init();
